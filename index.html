      .post-head,

        padding-left: 14px;

      .post-card {

      .post-body h1 {

      }

      .card-ring {
        height: 210px;
      }

      .biz-card {
        width: min(88vw, 320px);

    }

  <script>
    const cards = Array.from(document.querySelectorAll('.biz-card'));
    const dots = Array.from(document.querySelectorAll('.card-dot'));
    const totalCards = cards.length;

    let activeIndex = 0;
    let autoRotate = null;

    function normalizeIndex(index) {
      return (index + totalCards) % totalCards;
    }

    function renderCards() {
      cards.forEach((card, i) => {
        const offset = (i - activeIndex + totalCards) % totalCards;

        let x = 0;
        let z = 0;
        let rotateY = 0;
        let scale = 1;
        let opacity = 1;
        let blur = 0;
        let zIndex = 1;

        if (offset === 0) {
          x = 0;
          z = 140;
          rotateY = 0;
          scale = 1;
          opacity = 1;
          blur = 0;
          zIndex = 3;
        } else if (offset === 1) {
          x = 220;
          z = -90;
          rotateY = -30;
          scale = 0.88;
          opacity = 0.72;
          blur = 0.2;
          zIndex = 2;
        } else {
          x = -220;
          z = -90;
          rotateY = 30;
          scale = 0.88;
          opacity = 0.72;
          blur = 0.2;
          zIndex = 2;
        }

        card.style.transform = `
          translate3d(calc(-50% + ${x}px), -50%, ${z}px)
          rotateY(${rotateY}deg)
          scale(${scale})
        `;
        card.style.opacity = opacity;
        card.style.filter = `blur(${blur}px) saturate(${offset === 0 ? 1.04 : 0.9})`;
        card.style.zIndex = zIndex;
      });

      dots.forEach((dot, i) => {
        dot.classList.toggle('is-active', i === activeIndex);
      });
    }

    function goToCard(index) {
      activeIndex = normalizeIndex(index);
      renderCards();
      restartAutoRotate();
    }

    function nextCard() {
      activeIndex = normalizeIndex(activeIndex + 1);
      renderCards();
    }

    function restartAutoRotate() {
      clearInterval(autoRotate);
      autoRotate = setInterval(nextCard, 1500);
    }

    cards.forEach((card, index) => {
      card.addEventListener('click', () => goToCard(index));
      card.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          goToCard(index);
        }
      });
    });

    dots.forEach((dot, index) => {
      dot.addEventListener('click', () => goToCard(index));
    });

    renderCards();
    restartAutoRotate();
  </script>
